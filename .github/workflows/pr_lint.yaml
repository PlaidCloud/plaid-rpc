name: Lint and Test PlaidCloud RPC
on:
  pull_request:
    branches:
      - master
env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  reviewdog:
    name: Lint PlaidCloud RPC w ReviewDog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ensure python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.11.10"
      - name: Install dependencies
        run: |
          uv pip install --system -e .[full]
          uv pip install --system -q ruff
      - name: License Checker
        uses: andersy005/gh-action-py-liccheck@main
        with:
          strategy-ini-file: ./liccheck.ini
          level: cautious
          requirements-txt-file: ./requirements.txt
          liccheck-version: ${{ vars.LICCHECK_VERSION }}
      - name: Install ReviewDog
        uses: reviewdog/action-setup@v1
      - name: Perform Ruff Lint
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ruff check plaidcloud --output-format=concise --exit-zero 2>&1 | reviewdog -efm="%f:%l:%c: %m" -name="Ruff" -reporter=github-check -level=warning -fail-level=error
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Ensure python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install dependencies
        run: pip install -e ".[test]"
      - name: Run pytest with coverage
        run: |
          pytest plaidcloud/rpc/tests/ -v \
            --cov=plaidcloud.rpc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=100 \
            --junitxml=test-results.xml
      - name: Test Results
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: test-results.xml
          check_name: Test Results
      - name: Pytest Coverage Comment
        if: always()
        uses: MishaKav/pytest-coverage-comment@v1.8.0
        with:
          pytest-xml-coverage-path: coverage.xml
          junitxml-path: test-results.xml
